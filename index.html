<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.ibb.co/Q39DJJzq/image.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FF6B00 0%, #FF8C42 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .dot {
            width: 48px;
            height: 48px;
            border: 5px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: white;
            text-decoration: underline;
        }
    </style>
    <script>
        // Redirecionamento direto - ÚNICA FORMA QUE FUNCIONA
        window.location.replace("https://script.google.com/macros/s/AKfycbxZ0Yy10ux0Nty1tPJsdYQ4nG--dmddYpoypO9Bgpvv1oCDdF7cF7CQY9-kp1W59lrD/exec");
    </script>
</head>
<body>
    <div class="loader">
        <div class="dot"></div>
        <p>Redirecionando para o sistema Big Reuniões...</p>
        <p style="font-size: 14px; margin-top: 20px;">
            Se não for redirecionado automaticamente, 
            <a href="https://script.google.com/macros/s/AKfycbxZ0Yy10ux0Nty1tPJsdYQ4nG--dmddYpoypO9Bgpvv1oCDdF7cF7CQY9-kp1W59lrD/exec">clique aqui</a>
